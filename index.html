<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0D0B09">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Pappas Gig</title>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0B09;
      --surface: #1A1714;
      --surface-hover: #272220;
      --border: #302A24;
      --text: #F0EBE3;
      --text-dim: #887E70;
      --text-faint: #504840;
      --accent: #E89820;
      --accent-dim: #A06810;
      --accent-glow: rgba(232, 152, 32, 0.25);
      --danger: #C84040;
      --danger-bg: #3A1818;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans', Ubuntu, sans-serif;
      font-size: 18px;
      line-height: 1.4;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      background-image: radial-gradient(ellipse at 50% 35%, rgba(232, 152, 32, 0.03) 0%, transparent 60%);
    }

    /* ===== VIEWS ===== */
    .view {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .view.active { display: flex; }

    /* ===== COMMON HEADER ===== */
    .view-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      min-height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-align: center;
      flex: 1;
    }

    /* ===== BUTTONS ===== */
    button {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 60px;
      min-width: 60px;
      padding: 14px 28px;
      border-radius: 16px;
      font-size: 20px;
      font-weight: 700;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:active { transform: scale(0.96); }

    .btn-primary {
      background: var(--accent);
      color: #0D0B09;
    }
    .btn-primary:active { background: var(--accent-dim); }

    .btn-ghost {
      background: var(--surface);
      border: 2px solid var(--border);
      color: var(--text);
    }
    .btn-ghost:active { background: var(--surface-hover); }

    .btn-danger {
      background: var(--danger-bg);
      color: #F08080;
    }
    .btn-danger:active { background: var(--danger); color: white; }

    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      min-width: 52px;
      padding: 12px;
      border-radius: 50%;
      color: var(--text-dim);
      transition: background 0.15s;
    }
    .btn-icon:active { background: var(--surface-hover); }

    .btn-back {
      display: flex;
      align-items: center;
      gap: 4px;
      min-height: 52px;
      min-width: 80px;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
    }
    .btn-back:active { opacity: 0.7; }
    .btn-back svg { flex-shrink: 0; }

    .header-spacer { width: 80px; flex-shrink: 0; }

    /* ===== SCROLLABLE LIST ===== */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: 8px 0;
    }

    .view-bottom-action {
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: var(--bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-bottom-action .btn { width: 100%; }

    /* ========================================== */
    /*              LIVE VIEW                     */
    /* ========================================== */
    .live-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      min-height: 56px;
      flex-shrink: 0;
    }

    .live-playlist-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-dim);
      padding: 8px 0;
    }

    .live-header-actions {
      display: flex;
      gap: 6px;
    }

    .live-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      text-align: center;
    }

    .live-song-number {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-faint);
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .live-song-title {
      font-size: clamp(32px, 7vw, 56px);
      font-weight: 800;
      color: var(--text);
      line-height: 1.15;
      margin-bottom: 16px;
      max-width: 700px;
      word-break: break-word;
    }

    .live-next-song {
      font-size: 20px;
      color: var(--text-dim);
      max-width: 500px;
    }
    .live-next-song.queued {
      color: var(--accent);
    }

    .live-queue-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 16px;
      background: rgba(232, 152, 32, 0.12);
      border: 1px solid rgba(232, 152, 32, 0.25);
      border-radius: 20px;
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
    }

    .live-footer {
      flex-shrink: 0;
      padding: 0 24px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    .progress-container { padding: 0 4px; }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--surface);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.25s linear;
    }

    .progress-times {
      display: flex;
      justify-content: space-between;
      padding: 6px 2px 0;
      font-size: 15px;
      color: var(--text-dim);
      font-variant-numeric: tabular-nums;
    }

    .live-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 36px;
      padding: 18px 0 8px;
    }

    .btn-transport {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      color: var(--text);
      transition: transform 0.1s, background 0.15s;
    }
    .btn-transport:active { transform: scale(0.92); }

    .btn-play {
      width: 88px;
      height: 88px;
      background: var(--accent);
      color: #0D0B09;
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .btn-play.playing {
      animation: pulse-glow 2.5s ease-in-out infinite;
    }

    .btn-skip {
      width: 68px;
      height: 68px;
      background: var(--surface);
      border: 2px solid var(--border);
    }
    .btn-skip:active { background: var(--surface-hover); }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 4px 20px var(--accent-glow); }
      50% { box-shadow: 0 4px 40px var(--accent-glow), 0 0 60px rgba(232, 152, 32, 0.12); }
    }

    /* ========================================== */
    /*             PLAYLISTS VIEW                 */
    /* ========================================== */
    .playlist-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      margin: 4px 12px;
      border-radius: 14px;
      background: var(--surface);
      cursor: pointer;
      transition: background 0.12s;
      min-height: 70px;
    }
    .playlist-row:active { background: var(--surface-hover); }

    .playlist-row-info { flex: 1; }

    .playlist-row-name {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
    }

    .playlist-row-count {
      font-size: 15px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .playlist-row-arrow {
      color: var(--text-faint);
      margin-left: 12px;
      flex-shrink: 0;
    }

    /* ========================================== */
    /*           PLAYLIST DETAIL VIEW             */
    /* ========================================== */
    .song-row {
      display: flex;
      align-items: center;
      padding: 14px 12px 14px 8px;
      margin: 2px 12px;
      border-radius: 12px;
      min-height: 62px;
      position: relative;
      background: var(--bg);
    }

    .song-row.dragging {
      background: var(--surface-hover);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    .drag-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      color: var(--text-faint);
      flex-shrink: 0;
      touch-action: none;
      cursor: grab;
    }
    .drag-handle:active { color: var(--text-dim); }

    .song-row-number {
      width: 32px;
      text-align: center;
      font-size: 15px;
      font-weight: 600;
      color: var(--text-faint);
      flex-shrink: 0;
    }

    .song-row-name {
      flex: 1;
      font-size: 19px;
      font-weight: 500;
      color: var(--text);
      padding: 0 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-row-delete {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      color: var(--text-faint);
      flex-shrink: 0;
    }
    .song-row-delete:active { color: var(--danger); background: var(--danger-bg); }

    /* ========================================== */
    /*          CREATE PLAYLIST VIEW              */
    /* ========================================== */
    .create-name-section {
      padding: 16px;
      flex-shrink: 0;
    }

    .input-large {
      width: 100%;
      padding: 16px 20px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 20px;
      font-weight: 600;
      outline: none;
      -webkit-appearance: none;
    }
    .input-large::placeholder { color: var(--text-faint); }
    .input-large:focus { border-color: var(--accent); }

    .song-check-row {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      margin: 2px 12px;
      border-radius: 12px;
      min-height: 62px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .song-check-row:active { background: var(--surface); }

    .song-checkbox {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--surface);
      margin-right: 14px;
      flex-shrink: 0;
      transition: background 0.12s, border-color 0.12s;
    }

    .song-check-row.checked .song-checkbox {
      background: var(--accent);
      border-color: var(--accent);
    }

    .song-check-row.checked .song-checkbox svg { display: block; }
    .song-check-row .song-checkbox svg { display: none; }

    .song-check-name {
      font-size: 19px;
      font-weight: 500;
      color: var(--text);
    }

    /* ========================================== */
    /*              QUEUE MODAL                   */
    /* ========================================== */
    .modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 100;
      display: none;
    }
    .modal.active { display: flex; }

    .modal-backdrop {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.7);
    }

    .modal-panel {
      position: relative;
      margin: auto;
      width: 92%;
      max-width: 500px;
      max-height: 80vh;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .modal-header h2 {
      font-size: 22px;
      font-weight: 700;
    }

    .queue-song-row {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      min-height: 60px;
      cursor: pointer;
      transition: background 0.12s;
      border-bottom: 1px solid var(--border);
    }
    .queue-song-row:last-child { border-bottom: none; }
    .queue-song-row:active { background: var(--surface); }

    .queue-song-name {
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      flex: 1;
    }

    .queue-song-add {
      color: var(--accent);
      font-size: 15px;
      font-weight: 600;
      flex-shrink: 0;
      margin-left: 12px;
    }

    /* ===== CONFIRM DIALOG ===== */
    .confirm-panel {
      position: relative;
      margin: auto;
      width: 88%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
    }
    .confirm-panel h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .confirm-panel p {
      font-size: 17px;
      color: var(--text-dim);
      margin-bottom: 24px;
    }
    .confirm-actions {
      display: flex;
      gap: 12px;
    }
    .confirm-actions .btn { flex: 1; }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 14px 28px;
      border-radius: 40px;
      font-size: 17px;
      font-weight: 600;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* ===== UTILITY ===== */
    .hidden { display: none !important; }

    /* Landscape tweaks */
    @media (orientation: landscape) {
      .live-main { padding: 0 40px; }
      .live-controls { gap: 48px; }
      .live-song-title { font-size: clamp(36px, 5vw, 52px); }
    }

    /* Small screens */
    @media (max-height: 500px) {
      .live-song-number { display: none; }
      .live-song-title { font-size: 28px; margin-bottom: 8px; }
      .live-next-song { font-size: 17px; }
      .live-controls { gap: 24px; padding: 10px 0 4px; }
      .btn-play { width: 72px; height: 72px; }
      .btn-skip { width: 56px; height: 56px; }
    }
  </style>
</head>
<body>

  <!-- ============ LIVE VIEW ============ -->
  <div id="view-live" class="view active">
    <div class="live-header">
      <span id="live-playlist-name" class="live-playlist-name"></span>
      <div class="live-header-actions">
        <button class="btn-icon" onclick="openQueue()" aria-label="K\u00f6a l\u00e5t">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="btn-icon" onclick="showView('playlists')" aria-label="Spellistor">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="14" y2="18"/></svg>
        </button>
      </div>
    </div>

    <div class="live-main">
      <div id="live-song-number" class="live-song-number"></div>
      <div id="live-song-title" class="live-song-title">--</div>
      <div id="live-next-song" class="live-next-song"></div>
      <div id="live-queue-badge" class="live-queue-badge hidden"></div>
    </div>

    <div class="live-footer">
      <div class="progress-container">
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="progress-times">
          <span id="time-current">0:00</span>
          <span id="time-total">0:00</span>
        </div>
      </div>
      <div class="live-controls">
        <button class="btn-transport btn-skip" onclick="prevSong()" aria-label="F\u00f6reg\u00e5ende">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="5" width="3" height="14" rx="1"/><polygon points="20,5 10,12 20,19"/></svg>
        </button>
        <button id="btn-play" class="btn-transport btn-play" onclick="togglePlay()" aria-label="Spela">
          <svg id="icon-play" width="38" height="38" viewBox="0 0 24 24" fill="currentColor"><polygon points="7,4 20,12 7,20"/></svg>
          <svg id="icon-pause" width="38" height="38" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4.5" height="16" rx="1.2"/><rect x="13.5" y="4" width="4.5" height="16" rx="1.2"/></svg>
        </button>
        <button class="btn-transport btn-skip" onclick="nextSong()" aria-label="N\u00e4sta">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><polygon points="4,5 14,12 4,19"/><rect x="17" y="5" width="3" height="14" rx="1"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ============ PLAYLISTS VIEW ============ -->
  <div id="view-playlists" class="view">
    <div class="view-header">
      <button class="btn-back" onclick="showView('live')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
        Spela
      </button>
      <h1>Spellistor</h1>
      <div class="header-spacer"></div>
    </div>
    <div id="playlist-list" class="scroll-area"></div>
    <div class="view-bottom-action">
      <button class="btn btn-ghost" onclick="showView('create')">+ Ny spellista</button>
    </div>
  </div>

  <!-- ============ PLAYLIST DETAIL VIEW ============ -->
  <div id="view-detail" class="view">
    <div class="view-header">
      <button class="btn-back" onclick="showView('playlists')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
        Listor
      </button>
      <h1 id="detail-title"></h1>
      <button class="btn-icon" onclick="confirmDelete()" aria-label="Ta bort" style="color:var(--danger)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </button>
    </div>
    <div id="detail-songs" class="scroll-area"></div>
    <div class="view-bottom-action">
      <button class="btn btn-primary" onclick="playDetailPlaylist()">&#9654; Spela denna lista</button>
    </div>
  </div>

  <!-- ============ CREATE PLAYLIST VIEW ============ -->
  <div id="view-create" class="view">
    <div class="view-header">
      <button class="btn-back" onclick="showView('playlists')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15,18 9,12 15,6"/></svg>
        Avbryt
      </button>
      <h1>Ny spellista</h1>
      <div class="header-spacer"></div>
    </div>
    <div class="create-name-section">
      <input type="text" id="create-name" class="input-large" placeholder="Namn p\u00e5 spellista...">
    </div>
    <div id="create-songs" class="scroll-area"></div>
    <div class="view-bottom-action">
      <button class="btn btn-primary" onclick="createPlaylist()">Skapa spellista</button>
    </div>
  </div>

  <!-- ============ QUEUE MODAL ============ -->
  <div id="modal-queue" class="modal">
    <div class="modal-backdrop" onclick="closeQueue()"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <h2>K\u00f6a n\u00e4sta</h2>
        <button class="btn-icon" onclick="closeQueue()">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="queue-songs" class="scroll-area"></div>
    </div>
  </div>

  <!-- ============ CONFIRM MODAL ============ -->
  <div id="modal-confirm" class="modal">
    <div class="modal-backdrop" onclick="closeConfirm()"></div>
    <div class="confirm-panel">
      <h2 id="confirm-title"></h2>
      <p id="confirm-message"></p>
      <div class="confirm-actions">
        <button class="btn btn-ghost" onclick="closeConfirm()">Avbryt</button>
        <button class="btn btn-danger" onclick="doConfirmedDelete()">Ta bort</button>
      </div>
    </div>
  </div>

  <!-- ============ TOAST ============ -->
  <div id="toast"></div>

  <!-- ============ AUDIO ============ -->
  <audio id="audio" preload="auto"></audio>

  <script>
    /* ==========================================================
       PAPPAS GIG-APP
       En enkel musikspelare f\u00f6r live-spelningar.
       ========================================================== */

    const MUSIK_PATH = 'musik/';

    /* Song list: filenames (without .mp3) that must match files in musik/ folder.
       Display names with Swedish characters are mapped separately. */
    const DEFAULT_SONGS = [
      'Ett av dom satt',
      'Living Doll',
      'Good Luck Charm',
      'I mina skor',
      'I Need More Of You',
      'For dina blaa ogons skull',
      'Tro mig jag behover dig',
      'Minnen',
      'Jag har bott vid en landsvag',
      'Leende guldbruna ogon',
      'Crazy',
      'Teddy Bear',
      'Ljus och varme',
      'The Great Snowman',
      'Natten har tusen ogon',
      'Blue Hawaii',
      'Men bara om min alskade',
      'Mini Gitarr',
      'Alska glomma och forlata',
      'Vi har sa mycket att saga varann',
      'Inga stora bevingade ord',
      'Travellin Light'
    ];

    /* Display names with proper Swedish characters */
    const DISPLAY = {};
    DISPLAY['Ett av dom satt'] = 'Ett av dom s\u00e4tt';
    DISPLAY['For dina blaa ogons skull'] = 'F\u00f6r dina bl\u00e5a \u00f6gons skull';
    DISPLAY['Tro mig jag behover dig'] = 'Tro mig jag beh\u00f6ver dig';
    DISPLAY['Jag har bott vid en landsvag'] = 'Jag har bott vid en landsv\u00e4g';
    DISPLAY['Leende guldbruna ogon'] = 'Leende guldbruna \u00f6gon';
    DISPLAY['Ljus och varme'] = 'Ljus och v\u00e4rme';
    DISPLAY['Natten har tusen ogon'] = 'Natten har tusen \u00f6gon';
    DISPLAY['Men bara om min alskade'] = 'Men bara om min \u00e4lskade';
    DISPLAY['Alska glomma och forlata'] = '\u00c4lska gl\u00f6mma och f\u00f6rl\u00e5ta';
    DISPLAY['Vi har sa mycket att saga varann'] = 'Vi har s\u00e5 mycket att s\u00e4ga varann';
    DISPLAY["Travellin Light"] = "Travellin' Light";

    function dn(id) { return DISPLAY[id] || id; }

    const ALL_SONGS = [...new Set(DEFAULT_SONGS)];

    /* ---------- STATE ---------- */
    let state = {
      playlists: [],
      currentPlaylistId: null,
      currentIndex: 0,
      queue: []
    };

    let isPlaying = false;
    let currentQueuedSong = null;  // song id if playing a queued song
    let detailPlaylistId = null;
    let createChecked = new Set();
    let toastTimer = null;
    let progressRAF = null;

    const audio = document.getElementById('audio');

    /* ---------- PERSISTENCE ---------- */
    function loadState() {
      try {
        const s = JSON.parse(localStorage.getItem('pappas-gig'));
        if (s) {
          state.playlists = s.playlists || [];
          state.currentPlaylistId = s.currentPlaylistId || null;
          state.currentIndex = s.currentIndex || 0;
          state.queue = s.queue || [];
        }
      } catch (e) {}

      if (!state.playlists.length) {
        state.playlists = [{
          id: 'pappas-gig',
          name: 'Pappas Gig',
          songs: DEFAULT_SONGS.slice()
        }];
        state.currentPlaylistId = 'pappas-gig';
      }
      if (!state.currentPlaylistId) {
        state.currentPlaylistId = state.playlists[0].id;
      }
    }

    function save() {
      try {
        localStorage.setItem('pappas-gig', JSON.stringify({
          playlists: state.playlists,
          currentPlaylistId: state.currentPlaylistId,
          currentIndex: state.currentIndex,
          queue: state.queue
        }));
      } catch (e) {}
    }

    /* ---------- HELPERS ---------- */
    function pl(id) {
      return state.playlists.find(function(p) { return p.id === (id || state.currentPlaylistId); });
    }

    function curSong() {
      if (currentQueuedSong) return currentQueuedSong;
      var p = pl();
      return p && p.songs[state.currentIndex] ? p.songs[state.currentIndex] : '';
    }

    function nextSongName() {
      if (state.queue.length) return state.queue[0];
      var p = pl();
      if (!p) return null;
      var ni = state.currentIndex + 1;
      return ni < p.songs.length ? p.songs[ni] : null;
    }

    function fmt(s) {
      if (!s || isNaN(s)) return '0:00';
      var m = Math.floor(s / 60);
      var sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function uid() {
      return 'pl-' + Date.now() + '-' + Math.random().toString(36).substr(2, 5);
    }

    function esc(s) {
      var d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    /* ---------- AUDIO ---------- */
    function playFile(songId) {
      audio.src = MUSIK_PATH + encodeURIComponent(songId) + '.mp3';
      audio.play().then(function() {
        isPlaying = true;
        startProgress();
        updateLive();
      }).catch(function() {
        showToast('Kunde inte spela: ' + dn(songId));
        isPlaying = false;
        updateLive();
      });
    }

    function togglePlay() {
      if (isPlaying) {
        audio.pause();
        isPlaying = false;
        stopProgress();
        updateLive();
        return;
      }
      var s = curSong();
      if (!s) return;
      if (!audio.src || audio.ended || audio.src === location.href) {
        playFile(s);
      } else {
        audio.play().then(function() {
          isPlaying = true;
          startProgress();
          updateLive();
        }).catch(function() {
          showToast('Kunde inte spela');
        });
      }
    }

    function nextSong() {
      if (state.queue.length) {
        currentQueuedSong = state.queue.shift();
        playFile(currentQueuedSong);
        save();
        return;
      }
      currentQueuedSong = null;
      var p = pl();
      if (!p) return;
      var ni = state.currentIndex + 1;
      if (ni < p.songs.length) {
        state.currentIndex = ni;
      } else {
        state.currentIndex = 0;
      }
      playFile(p.songs[state.currentIndex]);
      save();
    }

    function prevSong() {
      currentQueuedSong = null;
      var p = pl();
      if (!p) return;
      if (audio.currentTime > 3) {
        audio.currentTime = 0;
        if (!isPlaying) { audio.play(); isPlaying = true; }
        updateLive();
        return;
      }
      state.currentIndex = state.currentIndex > 0 ? state.currentIndex - 1 : p.songs.length - 1;
      playFile(p.songs[state.currentIndex]);
      save();
    }

    audio.addEventListener('ended', function() {
      if (state.queue.length) {
        currentQueuedSong = state.queue.shift();
        playFile(currentQueuedSong);
        save();
        return;
      }
      currentQueuedSong = null;
      var p = pl();
      if (!p) return;
      var ni = state.currentIndex + 1;
      if (ni < p.songs.length) {
        state.currentIndex = ni;
        playFile(p.songs[ni]);
        save();
      } else {
        isPlaying = false;
        stopProgress();
        updateLive();
      }
    });

    /* ---------- PROGRESS ---------- */
    function startProgress() {
      stopProgress();
      (function tick() {
        updateProgressBar();
        progressRAF = requestAnimationFrame(tick);
      })();
    }

    function stopProgress() {
      if (progressRAF) { cancelAnimationFrame(progressRAF); progressRAF = null; }
    }

    function updateProgressBar() {
      if (audio.duration && !isNaN(audio.duration)) {
        document.getElementById('progress-fill').style.width =
          (audio.currentTime / audio.duration * 100) + '%';
        document.getElementById('time-current').textContent = fmt(audio.currentTime);
        document.getElementById('time-total').textContent = fmt(audio.duration);
      }
    }

    /* ---------- VIEWS ---------- */
    function showView(id) {
      document.querySelectorAll('.view').forEach(function(v) { v.classList.remove('active'); });
      document.getElementById('view-' + id).classList.add('active');
      if (id === 'live') updateLive();
      if (id === 'playlists') renderPlaylists();
      if (id === 'detail') renderDetail();
      if (id === 'create') renderCreate();
    }

    /* --- LIVE --- */
    function updateLive() {
      var p = pl();
      var song = curSong();
      var next = nextSongName();

      document.getElementById('live-playlist-name').textContent = p ? p.name : '';
      document.getElementById('live-song-number').textContent =
        p ? (state.currentIndex + 1) + ' av ' + p.songs.length : '';
      document.getElementById('live-song-title').textContent = song ? dn(song) : '--';

      var nextEl = document.getElementById('live-next-song');
      if (next) {
        nextEl.textContent = 'N\u00e4sta: ' + dn(next);
        nextEl.className = 'live-next-song' + (state.queue.length ? ' queued' : '');
      } else {
        nextEl.textContent = (p && state.currentIndex >= p.songs.length - 1) ? 'Sista l\u00e5ten' : '';
        nextEl.className = 'live-next-song';
      }

      var badge = document.getElementById('live-queue-badge');
      if (state.queue.length) {
        badge.textContent = state.queue.length + ' k\u00f6ad' + (state.queue.length > 1 ? 'e' : '');
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }

      document.getElementById('icon-play').style.display = isPlaying ? 'none' : 'block';
      document.getElementById('icon-pause').style.display = isPlaying ? 'block' : 'none';
      var btn = document.getElementById('btn-play');
      if (isPlaying) btn.classList.add('playing');
      else btn.classList.remove('playing');

      updateProgressBar();
    }

    /* --- PLAYLISTS --- */
    function renderPlaylists() {
      var c = document.getElementById('playlist-list');
      c.innerHTML = '';
      state.playlists.forEach(function(p) {
        var row = document.createElement('div');
        row.className = 'playlist-row';
        row.innerHTML =
          '<div class="playlist-row-info">' +
            '<div class="playlist-row-name">' + esc(p.name) + '</div>' +
            '<div class="playlist-row-count">' + p.songs.length + ' l\u00e5tar</div>' +
          '</div>' +
          '<div class="playlist-row-arrow">' +
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9,6 15,12 9,18"/></svg>' +
          '</div>';
        row.addEventListener('click', function() {
          detailPlaylistId = p.id;
          showView('detail');
        });
        c.appendChild(row);
      });
    }

    /* --- DETAIL --- */
    function renderDetail() {
      var p = pl(detailPlaylistId);
      if (!p) { showView('playlists'); return; }
      document.getElementById('detail-title').textContent = p.name;

      var c = document.getElementById('detail-songs');
      c.innerHTML = '';
      p.songs.forEach(function(song, i) {
        var row = document.createElement('div');
        row.className = 'song-row';
        row.dataset.index = i;
        row.innerHTML =
          '<div class="drag-handle">' +
            '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="5" r="1.8"/><circle cx="15" cy="5" r="1.8"/><circle cx="9" cy="12" r="1.8"/><circle cx="15" cy="12" r="1.8"/><circle cx="9" cy="19" r="1.8"/><circle cx="15" cy="19" r="1.8"/></svg>' +
          '</div>' +
          '<span class="song-row-number">' + (i + 1) + '</span>' +
          '<span class="song-row-name">' + esc(dn(song)) + '</span>' +
          '<button class="song-row-delete" aria-label="Ta bort">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>' +
          '</button>';

        row.querySelector('.song-row-delete').addEventListener('click', function(e) {
          e.stopPropagation();
          if (p.songs.length <= 1) { showToast('Kan inte ta bort sista l\u00e5ten'); return; }
          p.songs.splice(i, 1);
          save();
          renderDetail();
        });

        c.appendChild(row);
      });

      setupDragDrop(c, function(from, to) {
        var s = p.songs.splice(from, 1)[0];
        p.songs.splice(to, 0, s);
        save();
        renderDetail();
      });
    }

    function playDetailPlaylist() {
      state.currentPlaylistId = detailPlaylistId;
      state.currentIndex = 0;
      state.queue = [];
      currentQueuedSong = null;
      save();
      showView('live');
      playFile(pl().songs[0]);
    }

    /* --- DELETE PLAYLIST --- */
    var deleteTargetId = null;

    function confirmDelete() {
      if (state.playlists.length <= 1) {
        showToast('Kan inte ta bort sista spellistan');
        return;
      }
      deleteTargetId = detailPlaylistId;
      var p = pl(deleteTargetId);
      document.getElementById('confirm-title').textContent = 'Ta bort?';
      document.getElementById('confirm-message').textContent = 'Ta bort \u201c' + p.name + '\u201d?';
      document.getElementById('modal-confirm').classList.add('active');
    }

    function closeConfirm() {
      document.getElementById('modal-confirm').classList.remove('active');
      deleteTargetId = null;
    }

    function doConfirmedDelete() {
      if (!deleteTargetId) return;
      state.playlists = state.playlists.filter(function(p) { return p.id !== deleteTargetId; });
      if (state.currentPlaylistId === deleteTargetId) {
        state.currentPlaylistId = state.playlists[0].id;
        state.currentIndex = 0;
      }
      save();
      closeConfirm();
      showView('playlists');
      showToast('Spellista borttagen');
    }

    /* --- CREATE PLAYLIST --- */
    function renderCreate() {
      createChecked = new Set();
      document.getElementById('create-name').value = '';

      var c = document.getElementById('create-songs');
      c.innerHTML = '';
      ALL_SONGS.forEach(function(song) {
        var row = document.createElement('div');
        row.className = 'song-check-row';
        row.innerHTML =
          '<div class="song-checkbox">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0D0B09" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,12 10,18 20,6"/></svg>' +
          '</div>' +
          '<span class="song-check-name">' + esc(dn(song)) + '</span>';

        row.addEventListener('click', function() {
          if (createChecked.has(song)) {
            createChecked.delete(song);
            row.classList.remove('checked');
          } else {
            createChecked.add(song);
            row.classList.add('checked');
          }
        });
        c.appendChild(row);
      });
    }

    function createPlaylist() {
      var name = document.getElementById('create-name').value.trim();
      if (!name) { showToast('Ange ett namn'); return; }
      if (!createChecked.size) { showToast('V\u00e4lj minst en l\u00e5t'); return; }

      var songs = ALL_SONGS.filter(function(s) { return createChecked.has(s); });
      var p = { id: uid(), name: name, songs: songs };
      state.playlists.push(p);
      save();
      detailPlaylistId = p.id;
      showView('detail');
      showToast('Spellista skapad!');
    }

    /* --- QUEUE MODAL --- */
    function openQueue() {
      var p = pl();
      if (!p) return;
      var c = document.getElementById('queue-songs');
      c.innerHTML = '';
      ALL_SONGS.forEach(function(song) {
        var row = document.createElement('div');
        row.className = 'queue-song-row';
        row.innerHTML =
          '<span class="queue-song-name">' + esc(dn(song)) + '</span>' +
          '<span class="queue-song-add">+ K\u00f6a</span>';
        row.addEventListener('click', function() {
          state.queue.push(song);
          save();
          closeQueue();
          showToast('K\u00f6ad: ' + dn(song));
          updateLive();
        });
        c.appendChild(row);
      });
      document.getElementById('modal-queue').classList.add('active');
    }

    function closeQueue() {
      document.getElementById('modal-queue').classList.remove('active');
    }

    /* ---------- DRAG & DROP ---------- */
    function setupDragDrop(container, onReorder) {
      var dragging = null;
      var startY = 0;
      var startIdx = -1;
      var dropIdx = -1;
      var items, rects, itemH;

      container.addEventListener('touchstart', function(e) {
        var handle = e.target.closest('.drag-handle');
        if (!handle) return;
        e.preventDefault();

        var row = handle.closest('.song-row');
        items = Array.from(container.querySelectorAll('.song-row'));
        startIdx = items.indexOf(row);
        dropIdx = startIdx;
        dragging = row;
        startY = e.touches[0].clientY;
        rects = items.map(function(el) { return el.getBoundingClientRect(); });
        itemH = rects[0] ? rects[0].height : 62;

        dragging.classList.add('dragging');
        items.forEach(function(it) {
          if (it !== dragging) it.style.transition = 'transform 0.18s ease';
        });
        dragging.style.transition = 'box-shadow 0.15s ease';
      }, { passive: false });

      container.addEventListener('touchmove', function(e) {
        if (!dragging) return;
        e.preventDefault();

        var dy = e.touches[0].clientY - startY;
        dragging.style.transform = 'translateY(' + dy + 'px) scale(1.03)';
        dragging.style.zIndex = '10';

        var center = rects[startIdx].top + rects[startIdx].height / 2 + dy;
        var ni = startIdx;
        for (var i = 0; i < rects.length; i++) {
          if (center > rects[i].top + rects[i].height / 2) ni = i;
        }

        if (ni !== dropIdx) {
          dropIdx = ni;
          items.forEach(function(it, i) {
            if (it === dragging) return;
            if (startIdx < dropIdx) {
              it.style.transform = (i > startIdx && i <= dropIdx) ? 'translateY(-' + itemH + 'px)' : '';
            } else if (startIdx > dropIdx) {
              it.style.transform = (i >= dropIdx && i < startIdx) ? 'translateY(' + itemH + 'px)' : '';
            } else {
              it.style.transform = '';
            }
          });
        }
      }, { passive: false });

      function end() {
        if (!dragging) return;
        var fi = dropIdx;
        items.forEach(function(it) {
          it.style.transform = '';
          it.style.transition = '';
          it.style.zIndex = '';
          it.classList.remove('dragging');
        });
        if (fi !== startIdx) onReorder(startIdx, fi);
        dragging = null;
      }

      container.addEventListener('touchend', end);
      container.addEventListener('touchcancel', end);
    }

    /* ---------- TOAST ---------- */
    function showToast(msg) {
      var el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2200);
    }

    /* ---------- FULLSCREEN ---------- */
    function goFullscreen() {
      var el = document.documentElement;
      var rfs = el.requestFullscreen || el.webkitRequestFullscreen;
      if (rfs) rfs.call(el);
    }

    // Gå till fullscreen vid första interaktion
    document.addEventListener('click', function once() {
      goFullscreen();
      document.removeEventListener('click', once);
    });

    /* ---------- INIT ---------- */
    loadState();
    updateLive();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
